name: Archive Card

# Triggered when a card PR is merged into master.
# Uses pull_request_target:[closed] instead of push so that it fires even when
# the merge was performed by GITHUB_TOKEN (push events from Actions tokens are
# suppressed to prevent loops, but PR-closed events are not).
on:
  pull_request_target:
    types: [closed]
    branches: [master]
    paths:
      - 'cards/*.html'

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    # Only run if the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Get added card file from PR
        id: card
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CARD_FILE=$(gh pr view ${{ github.event.pull_request.number }} --json files \
            --jq '.files[].path' | grep '^cards/' | grep -v 'template\.html' || true)
          echo "file=${CARD_FILE}" >> "$GITHUB_OUTPUT"
          if [ -z "$CARD_FILE" ]; then
            echo "No card file found in PR — skipping."
          else
            echo "Card file: $CARD_FILE"
          fi

      - name: Archive card
        if: steps.card.outputs.file != ''
        run: |
          FILE="${{ steps.card.outputs.file }}"
          echo "Formatting and archiving $FILE..."
          npx prettier --write "$FILE"
          node scripts/card-to-archive.js "$(basename "$FILE")"

      - name: Commit archived card
        if: steps.card.outputs.file != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/json/ archive/archiveFilesTotal.js
          git add -A cards/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          FILENAME=$(basename "${{ steps.card.outputs.file }}")
          git commit -m "archive card: ${FILENAME} [skip ci]"
          git push
