name: Archive Card

# Primary trigger: workflow_dispatch dispatched by validate-card-pr.yml after merge.
# workflow_dispatch is NOT suppressed by GITHUB_TOKEN (unlike push/PR events),
# so it fires reliably even when the merge was performed by a workflow token.
#
# Fallback: pull_request_target:[closed] for any merges not dispatched above.
on:
  workflow_dispatch:
    inputs:
      filename:
        description: 'Card filename to archive (e.g. syknapse.html)'
        required: true
        type: string
  pull_request_target:
    types: [closed]
    branches: [master]
    paths:
      - 'cards/*.html'

permissions:
  contents: write

jobs:
  archive:
    runs-on: ubuntu-latest
    # For pull_request_target: only run if the PR was actually merged.
    # For workflow_dispatch: always run (no PR event to check).
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - name: Checkout master
        uses: actions/checkout@v6
        with:
          ref: master
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm install

      - name: Resolve card filename
        id: card
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Filename passed directly as input
            FILENAME="${{ inputs.filename }}"
          else
            # Detect from PR's changed files (fallback pull_request_target path)
            FILENAME=$(gh pr view ${{ github.event.pull_request.number }} --json files \
              --jq '.files[].path' | grep '^cards/' | grep -v 'template\.html' \
              | xargs -I{} basename {} || true)
          fi
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"
          if [ -z "$FILENAME" ]; then
            echo "No card filename resolved — skipping."
          else
            echo "Card filename: $FILENAME"
          fi

      - name: Archive card
        if: steps.card.outputs.filename != ''
        run: |
          FILE="cards/${{ steps.card.outputs.filename }}"
          echo "Formatting and archiving $FILE..."
          npx prettier --write "$FILE"
          node scripts/card-to-archive.js "${{ steps.card.outputs.filename }}"

      - name: Commit archived card
        if: steps.card.outputs.filename != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archive/json/ archive/archiveFilesTotal.js
          git add -A cards/
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "archive card: ${{ steps.card.outputs.filename }} [skip ci]"
          git push
